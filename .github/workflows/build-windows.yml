name: build-shotcut-windows

on:
  workflow_dispatch:
  schedule:
    # nightly
    - cron: '0 8 * * *'

permissions:
  contents: read

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.repository_owner == 'mltframework' }}
    runs-on: windows-latest
    timeout-minutes: 90
    outputs:
      version: ${{ steps.set_version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            autotools base-devel bzip2 coreutils git gzip tar unzip xz zip
            perl-List-MoreUtils perl-XML-Parser
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-yasm
            mingw-w64-x86_64-cairo
            mingw-w64-x86_64-eigen3
            mingw-w64-x86_64-dlfcn
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-gettext-tools
            mingw-w64-x86_64-harfbuzz
            mingw-w64-x86_64-lame
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-libepoxy
            mingw-w64-x86_64-libexif
            mingw-w64-x86_64-libimagequant
            mingw-w64-x86_64-libsamplerate
            mingw-w64-x86_64-libtheora
            mingw-w64-x86_64-libvorbis
            mingw-w64-x86_64-libvpx
            mingw-w64-x86_64-libwebp
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-lilv
            mingw-w64-x86_64-onevpl
            mingw-w64-x86_64-openblas
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-opus
            mingw-w64-x86_64-potrace
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-charts
            mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-imageformats
            mingw-w64-x86_64-qt6-multimedia
            mingw-w64-x86_64-qt6-multimedia-wmf
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-qt6-translations
            mingw-w64-x86_64-qt6-websockets
            mingw-w64-x86_64-rubberband
            mingw-w64-x86_64-sox
            mingw-w64-x86_64-svt-av1
            mingw-w64-x86_64-vid.stab
            mingw-w64-x86_64-vulkan-headers
            mingw-w64-x86_64-vulkan-loader
            mingw-w64-x86_64-x264
            mingw-w64-x86_64-x265
            mingw-w64-x86_64-zimg

      - name: Install pinned GNU Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0-x86_64-pc-windows-gnu
          components: rustfmt, clippy

      - name: Set version
        id: set_version
        shell: msys2 {0}
        run: |
          VERSION="$(date +"%y.%-m.%-d")"
          echo VERSION=$VERSION
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        shell: msys2 {0}
        run: |
          pacman --noconfirm -Rdd mingw-w64-x86_64-aom
          echo VERSION=$VERSION
          cd "$HOME"
          echo Downloading a few prebuilt dependencies
          curl -kLO --no-progress-meter https://s3.amazonaws.com/misc.meltymedia/shotcut-build/mlt-prebuilt-mingw64-v7.txz
          echo Extracting prebuilt dependencies
          tar -xJf mlt-prebuilt-mingw64-v7.txz
          rm mlt-prebuilt-mingw64-v7.txz

      - name: Build
        shell: msys2 {0}
        run: |
          export PATH="$(cygpath -u "$USERPROFILE")/.cargo/bin:$PATH"
          export RUSTUP_TOOLCHAIN=1.97.0-x86_64-pc-windows-gnu
          command -v cargo >/dev/null
          command -v rustc >/dev/null
          test "$(rustc -vV | sed -n 's/^host: //p')" = x86_64-pc-windows-gnu
          echo INSTALL_DIR=\"$(pwd)/build\"
          echo INSTALL_DIR=\"$(pwd)/build\" > build-shotcut.conf
          echo SHOTCUT_VERSION=\"$VERSION\" >> build-shotcut.conf
          echo SHOTCUT_HEAD=0 >> build-shotcut.conf
          echo SHOTCUT_REPO=$PWD >> build-shotcut.conf
          echo SHOTCUT_REVISION=$GITHUB_SHA >> build-shotcut.conf
          echo SHOTCUT_BUILD_MCP_SERVER=1 >> build-shotcut.conf
          bash scripts/build-shotcut-msys2.sh

      - name: Package the portable zip
        shell: msys2 {0}
        run: |
          cd build
          test -s Shotcut/shotcut-mcp.exe || {
            echo "Missing or empty Shotcut/shotcut-mcp.exe" >&2
            exit 1
          }
          ldd_output="$(ldd Shotcut/shotcut-mcp.exe 2>&1 || true)"
          if grep -q 'not found' <<<"$ldd_output"; then
            printf '%s
' "$ldd_output" >&2
            exit 1
          fi
          zip -gr shotcut-win64-$VERSION.zip Shotcut
          member_count="$(unzip -Z1 "shotcut-win64-$VERSION.zip" |
            grep -Fxc 'Shotcut/shotcut-mcp.exe' || true)"
          test "$member_count" -eq 1 || {
            echo "Expected exactly one Shotcut/shotcut-mcp.exe in ZIP; found $member_count" >&2
            exit 1
          }

      - name: Smoke test extracted Windows portable
        id: windows_smoke
        shell: pwsh
        env:
          SHOTCUT_ZIP: ${{ github.workspace }}\build\shotcut-win64-${{ steps.set_version.outputs.version }}.zip
        run: .\.github\scripts\smoke-windows-portable.ps1 -Archive $env:SHOTCUT_ZIP

      - name: Upload Windows smoke diagnostics
        if: ${{ failure() && steps.windows_smoke.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: windows-gui-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}\shotcut-windows-smoke\diagnostics
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14

      - name: Upload portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-x64-portable
          path: ./build/shotcut-win64-${{ steps.set_version.outputs.version }}.zip

  upload-s3-portable:
    if: ${{ github.repository_owner == 'mltframework' && github.ref_name == 'master' }}
    runs-on: ubuntu-latest
    needs: build
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}

    steps:
      - name: Download portable artifact
        uses: actions/download-artifact@v6
        with:
          name: windows-x64-portable
          path: dist

      - name: Upload portable package to S3
        shell: bash
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          file="dist/shotcut-win64-$VERSION.zip"
          echo Uploading "$file" to S3
          aws s3 cp "$file" s3://builds.us.meltytech/shotcut/ --no-progress
