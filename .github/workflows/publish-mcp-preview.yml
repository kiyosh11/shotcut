name: Publish MCP preview release

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: publish-mcp-preview-c12b1d6
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_SHA: c12b1d6d568798e64720e39f06fa82832f79ac63
      RELEASE_TAG: mcp-preview-c12b1d6
      RELEASE_TITLE: MCP preview c12b1d6
      WINDOWS_ARTIFACT_ID: "8410977929"
      WINDOWS_ARTIFACT_NAME: windows-x64-portable
      WINDOWS_ARTIFACT_RUN_ID: "29587436714"
      WINDOWS_ARTIFACT_DIGEST: sha256:dbace289af43d60d39ea34f7a4fba8dd845d494de3b15ad27a8402387445a96d
      WINDOWS_FILENAME: shotcut-win64-26.7.17.zip
      LINUX_ARTIFACT_ID: "8410965663"
      LINUX_ARTIFACT_NAME: linux-portable
      LINUX_ARTIFACT_RUN_ID: "29587436582"
      LINUX_ARTIFACT_DIGEST: sha256:5a0110cad3c7759d41c6191ed87b0d97b4892ca211fd6b50254ddebacb45821c
      LINUX_FILENAME: shotcut-linux-x86_64-26.7.17.txz

    steps:
      - name: Publish verified portable artifacts
        shell: bash
        run: |
          set -Eeuo pipefail
          umask 077
          command -v curl gh jq unzip sha256sum >/dev/null

          work_dir="$(mktemp -d)"
          trap 'rm -rf "${work_dir}"' EXIT
          release_dir="${work_dir}/release-assets"
          mkdir -p "${release_dir}"

          api_path="repos/${GITHUB_REPOSITORY}"
          api_root="https://api.github.com/${api_path}"
          api_headers=(
            --header "Authorization: Bearer ${GH_TOKEN}"
            --header "Accept: application/vnd.github+json"
            --header "X-GitHub-Api-Version: 2022-11-28"
          )
          curl_get=(
            --fail
            --silent
            --show-error
            --location
            --retry 3
            --retry-all-errors
            --proto "=https"
            --tlsv1.2
          )

          api_status() {
            local url="$1"
            curl --silent --show-error               --output /dev/null               --write-out '%{http_code}'               --proto '=https'               --tlsv1.2               "${api_headers[@]}"               "${url}"
          }

          fetch_api() {
            local url="$1"
            curl "${curl_get[@]}" "${api_headers[@]}" "${url}"
          }

          tag_present=false
          tag_ref=''
          verify_tag_state() {
            local status
            status="$(api_status "${api_root}/git/ref/tags/${RELEASE_TAG}")"
            case "${status}" in
              200)
                tag_ref="$(fetch_api "${api_root}/git/ref/tags/${RELEASE_TAG}")"
                jq -e                   --arg sha "${TARGET_SHA}"                   '.object.type == "commit" and .object.sha == $sha'                   <<<"${tag_ref}" >/dev/null
                tag_present=true
                ;;
              404)
                tag_ref=''
                tag_present=false
                ;;
              *)
                echo "Unexpected HTTP status ${status} while checking tag." >&2
                exit 1
                ;;
            esac
          }

          validate_release_identity() {
            local release_json="$1"
            jq -e               --arg tag "${RELEASE_TAG}"               --arg title "${RELEASE_TITLE}"               --arg sha "${TARGET_SHA}"               '
                .tag_name == $tag
                and .name == $title
                and .target_commitish == $sha
                and .prerelease == true
              ' <<<"${release_json}" >/dev/null
          }

          validate_exact_assets() {
            local release_json="$1"
            jq -e               --arg windows "${WINDOWS_FILENAME}"               --arg linux "${LINUX_FILENAME}"               '
                ([.assets[].name] | sort)
                  == ([$windows, $linux, "SHA256SUMS.txt"] | sort)
                and ([.assets[].name] | length)
                  == ([.assets[].name] | unique | length)
                and all(.assets[]; .state == "uploaded" and .size > 0)
              ' <<<"${release_json}" >/dev/null
          }

          validate_draft_assets() {
            local release_json="$1"
            jq -e               --arg windows "${WINDOWS_FILENAME}"               --arg linux "${LINUX_FILENAME}"               '
                ([.assets[].name] | length)
                  == ([.assets[].name] | unique | length)
                and all(
                  .assets[];
                  (
                    .name == $windows
                    or .name == $linux
                    or .name == "SHA256SUMS.txt"
                  )
                  and .state == "uploaded"
                  and .size > 0
                )
              ' <<<"${release_json}" >/dev/null
          }

          verify_tag_state

          existing_draft_id=''
          release_status="$(api_status "${api_root}/releases/tags/${RELEASE_TAG}")"
          case "${release_status}" in
            200)
              existing_release="$(fetch_api "${api_root}/releases/tags/${RELEASE_TAG}")"
              validate_release_identity "${existing_release}"
              if [[ "$(jq -r '.draft' <<<"${existing_release}")" == "false" ]]; then
                if [[ "${tag_present}" != "true" ]]; then
                  echo "Published release is missing its exact tag." >&2
                  exit 1
                fi
                validate_exact_assets "${existing_release}"
                jq -r '.html_url, (.assets[].browser_download_url)'                   <<<"${existing_release}"
                exit 0
              fi
              jq -e '.draft == true' <<<"${existing_release}" >/dev/null
              validate_draft_assets "${existing_release}"
              existing_draft_id="$(jq -r '.id' <<<"${existing_release}")"
              ;;
            404) ;;
            *)
              echo "Unexpected HTTP status ${release_status} while checking release." >&2
              exit 1
              ;;
          esac

          validate_artifact() {
            local id="$1"
            local expected_name="$2"
            local expected_run_id="$3"
            local expected_digest="$4"
            local metadata
            metadata="$(fetch_api "${api_root}/actions/artifacts/${id}")"
            jq -e               --arg name "${expected_name}"               --arg sha "${TARGET_SHA}"               --argjson run_id "${expected_run_id}"               --arg digest "${expected_digest}"               '
                .name == $name
                and .expired == false
                and .workflow_run.head_sha == $sha
                and .workflow_run.id == $run_id
                and .digest == $digest
              ' <<<"${metadata}" >/dev/null
          }

          download_artifact() {
            local id="$1"
            local expected_digest="$2"
            local output="$3"
            curl "${curl_get[@]}" "${api_headers[@]}"               "${api_root}/actions/artifacts/${id}/zip"               --output "${output}"
            printf '%s  %s\n' "${expected_digest#sha256:}" "${output}"               | sha256sum --check --strict
          }

          extract_single_file() {
            local archive="$1"
            local expected_name="$2"
            local entries=()
            unzip -tqq "${archive}" >/dev/null
            mapfile -t entries < <(unzip -Z1 "${archive}")
            if (( ${#entries[@]} != 1 )); then
              echo "Expected one artifact entry, found ${#entries[@]}." >&2
              exit 1
            fi
            if [[ "${entries[0]}" != "${expected_name}" ]]; then
              echo "Unexpected artifact entry: ${entries[0]}" >&2
              exit 1
            fi
            unzip -p "${archive}" "${expected_name}"               > "${release_dir}/${expected_name}"
            test -s "${release_dir}/${expected_name}"
          }

          validate_artifact             "${WINDOWS_ARTIFACT_ID}"             "${WINDOWS_ARTIFACT_NAME}"             "${WINDOWS_ARTIFACT_RUN_ID}"             "${WINDOWS_ARTIFACT_DIGEST}"
          validate_artifact             "${LINUX_ARTIFACT_ID}"             "${LINUX_ARTIFACT_NAME}"             "${LINUX_ARTIFACT_RUN_ID}"             "${LINUX_ARTIFACT_DIGEST}"

          windows_outer="${work_dir}/windows-artifact.zip"
          linux_outer="${work_dir}/linux-artifact.zip"
          download_artifact             "${WINDOWS_ARTIFACT_ID}"             "${WINDOWS_ARTIFACT_DIGEST}"             "${windows_outer}"
          download_artifact             "${LINUX_ARTIFACT_ID}"             "${LINUX_ARTIFACT_DIGEST}"             "${linux_outer}"

          extract_single_file "${windows_outer}" "${WINDOWS_FILENAME}"
          extract_single_file "${linux_outer}" "${LINUX_FILENAME}"

          (
            cd "${release_dir}"
            sha256sum -- "${WINDOWS_FILENAME}" "${LINUX_FILENAME}"               > SHA256SUMS.txt
          )

          if [[ -n "${existing_draft_id}" ]]; then
            gh api --method DELETE               "${api_path}/releases/${existing_draft_id}"
          fi

          verify_tag_state
          if [[ "${tag_present}" != "true" ]]; then
            gh api --method POST "${api_path}/git/refs"               -f ref="refs/tags/${RELEASE_TAG}"               -f sha="${TARGET_SHA}" >/dev/null
          fi
          verify_tag_state
          if [[ "${tag_present}" != "true" ]]; then
            echo "Exact release tag was not established." >&2
            exit 1
          fi

          cat > "${work_dir}/release-notes.md" <<'EOF'
          Experimental unsigned portable preview built from commit c12b1d6d568798e64720e39f06fa82832f79ac63.

          - Windows: portable ZIP, not an installer
          - Linux: portable TXZ
          - Windows and Linux application builds passed
          - Rust formatting, Clippy, and tests passed on Ubuntu and Windows
          - C++ formatting passed

          Security notice: these binaries are unsigned and have not been malware-scanned. Test them in Windows Sandbox or a virtual machine with disposable media before considering use on a primary PC. SHA256SUMS.txt contains hashes for the two release assets.
          EOF

          gh release create "${RELEASE_TAG}"             --repo "${GITHUB_REPOSITORY}"             --target "${TARGET_SHA}"             --title "${RELEASE_TITLE}"             --notes-file "${work_dir}/release-notes.md"             --prerelease             --draft

          gh release upload "${RELEASE_TAG}"             "${release_dir}/${WINDOWS_FILENAME}"             "${release_dir}/${LINUX_FILENAME}"             "${release_dir}/SHA256SUMS.txt"             --repo "${GITHUB_REPOSITORY}"             --clobber

          draft_release="$(fetch_api "${api_root}/releases/tags/${RELEASE_TAG}")"
          validate_release_identity "${draft_release}"
          jq -e '.draft == true' <<<"${draft_release}" >/dev/null
          validate_exact_assets "${draft_release}"

          verify_tag_state
          if [[ "${tag_present}" != "true" ]]; then
            echo "Exact release tag disappeared before publication." >&2
            exit 1
          fi

          release_id="$(jq -r '.id' <<<"${draft_release}")"
          published_release="$(
            gh api --method PATCH               "${api_path}/releases/${release_id}"               -F draft=false               -F prerelease=true
          )"
          validate_release_identity "${published_release}"
          jq -e '.draft == false' <<<"${published_release}" >/dev/null
          validate_exact_assets "${published_release}"

          verify_tag_state
          if [[ "${tag_present}" != "true" ]]; then
            echo "Exact release tag disappeared after publication." >&2
            exit 1
          fi

          jq -r '.html_url, (.assets[].browser_download_url)'             <<<"${published_release}"
